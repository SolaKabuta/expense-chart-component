    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"

        <main class="min-h-screen w-screen grid place-content-center gap-5">

                <div class="bg-slate-500/50 w-full h-[0.5px] my-6"></div>

                    <!--TOTAL-->
                    <div>
                        <p class="text-slate-500/50 text-sm pb-2">
                            Total this month
                        </p>
                        <p id="total" class="font-bold text-3xl">
                            $478.33

                    </div>

                    <div class="text-right">
