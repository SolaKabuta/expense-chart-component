<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="./src/output.css" />

        <title>Frontend Mentor | Expenses chart component</title>

        <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
        <style></style>
    </head>
    <body>
        <main class="min-h-screen w-full w-93-75 px-10  grid place-content-center gap-5">
            <!--BALANCE-->
            <section class="flex justify-between items-center bg-[#EC755D] text-white rounded-lg px-8 py-6 w-[80%] md:w-full">
              <div>
                  <p class="opacity-80 text-sm">
                      My balance
                  </p>               
                  <p class="font-semibold text-2xl tracking-wider flex">$
                      <span id="balance"></span>
                  </p>
              </div> 
              <div>
                  <img src="/images/logo.svg" alt="expense-chart-logo" width="60" height="60">
              </div>
            </section>
            <!--SPENDING-->
            <section class=" bg-white text-[#3A2315] w-[80%] md:w-full h-max p-8 rounded-xl">
                <h1 class="font-semibold text-2xl mb-5">
                    Spending - Last 7 days
                </h1>
                <!--CHARTS-->
                <div class="grid place-items-center">
                    <ul id="charts" class="flex gap-1 [&>li]:flex [&>li]:flex-col [&>li]:items-center [&>li]:justify-end [&>li]:gap-2 [&_p]:text-sm ">
                    </ul>
                </div>
                <!--DIVIDER-->
                <div class="bg-[#F7E9DC] w-full h-px my-6"></div>
                <div class="flex justify-between items-end">
                    <!--TOTAL-->
                    <div>
                        <p class="text-slate-500/50 text-sm pb-1">
                            Total this month
                        </p>
                        <p class="font-bold text-3xl">
                            $ <span id="total-amount"></span>
                        </p>
                    </div>
                    <!--POURCENTAGE-->
                    <div class="text-right">
                        <p id="pourcentage" class="font-bold text-xs">
                            +2.4% 
                        </p>
                        <p class="text-slate-500/50 text-sm">           
                            from last month
                        </p>
                    </div>
                </div>              
            </section>
        </main>
        <footer class="attribution">
            Challenge by
            <a href="https://www.frontendmentor.io?ref=challenge"
                >Frontend Mentor
            </a>. Coded by 
            <a href="https://solakabuta.com">
                Sola Kabuta
            </a>.
        </footer>
        <script src="main.js"></script>
    </body>
</html>
